name: Sync to AgentKit Index

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed packages
        run: |
          git diff --name-only HEAD^1 HEAD -- 2>/dev/null | grep 'plugin\.json$' > changed.txt || true
          echo "Changed files:"; cat changed.txt || echo "(none)"

      - name: Sync changed packages
        env:
          SYNC_SECRET: ${{ secrets.AGENTKIT_SYNC_SECRET }}
          WORKER_URL: ${{ secrets.AGENTKIT_WORKER_URL }}
        run: python3 scripts/sync_packages.py changed.txt

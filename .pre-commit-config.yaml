repos:
  # General format hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: pretty-format-json
        args: [--autofix, --indent=2]
        files: plugin\.json$
      - id: check-added-large-files
        args: [--maxkb=100]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: detect-private-key

  # Markdown formatter
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat

  # Python linting for scripts/
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^scripts/
      - id: ruff-format
        files: ^scripts/

  # AgentKit custom validation
  - repo: local
    hooks:
      - id: validate-agentkit-package
        name: Validate AgentKit package
        entry: python scripts/validate_package.py
        language: python
        pass_filenames: true
        # Only trigger when files inside a package subdirectory change
        files: ^[^./][^/]*/
